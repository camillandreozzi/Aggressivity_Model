name: app-smoke-test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install streamlit

      - name: Syntax check
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile src/egt_core/base.py
          python -m py_compile src/egt_core/registry.py
          python -m py_compile src/egt_core/models/hawk_dove.py
          python -m py_compile src/egt_core/models/side_blotched.py
